<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CS2 Skin Tracker</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#111118;--card:#16161f;--card2:#1c1c28;
  --border:#2a2a3a;--orange:#e4a625;--orange2:#f0c060;
  --cyan:#00c8ff;--green:#39d353;--red:#ff4545;--purple:#a855f7;
  --text:#e8e8f0;--text2:#9090a8;--text3:#606078;
  --nav-h:58px;--head-h:52px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',system-ui,sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input{outline:none;font-family:inherit}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;opacity:.2}

/* LAYOUT */
#app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}

/* HEADER */
.hdr{height:var(--head-h);background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 14px;flex-shrink:0;position:relative}
.hdr::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--orange),transparent)}
.hdr-left{display:flex;align-items:center;gap:8px}
.hdr-hex{width:28px;height:28px;background:linear-gradient(135deg,var(--orange),#b07800);
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#000}
.hdr-title{font-size:17px;font-weight:700;letter-spacing:2px;color:var(--orange);text-transform:uppercase}
.hdr-sub{font-size:9px;color:var(--text3);letter-spacing:1px;font-family:'Share Tech Mono',monospace}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-premium{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;
  font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 8px;
  clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px))}
.hdr-avatar{width:28px;height:28px;border-radius:50%;border:1px solid var(--orange);
  background:var(--card2);display:flex;align-items:center;justify-content:center;
  font-size:12px;color:var(--orange);font-weight:700;overflow:hidden}
.hdr-avatar img{width:100%;height:100%;object-fit:cover}

/* NAV */
.nav{height:var(--nav-h);background:var(--bg2);border-top:1px solid var(--border);
  display:flex;flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  background:none;color:var(--text3);font-size:9px;letter-spacing:1px;text-transform:uppercase;
  font-family:'Share Tech Mono',monospace;transition:color .2s;position:relative}
.nav-btn svg{width:18px;height:18px}
.nav-btn.active{color:var(--orange)}
.nav-btn.active::before{content:'';position:absolute;top:0;left:15%;right:15%;height:2px;
  background:var(--orange);box-shadow:0 0 8px var(--orange)}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 10px 6px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{width:2px}
.content::-webkit-scrollbar-thumb{background:var(--border)}
.section{display:none}
.section.active{display:block}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);margin-bottom:8px;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
  overflow:hidden;transition:border-color .2s}
.card::before{content:'';display:block;height:2px;background:linear-gradient(90deg,var(--orange),transparent)}
.card:active{border-color:var(--orange)}
.card-inner{display:flex;align-items:center;gap:10px;padding:9px 12px}

/* SKIN IMAGE */
.simg{width:64px;height:48px;background:var(--card2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.simg img{width:100%;height:100%;object-fit:contain}
.simg-ph{color:var(--text3);font-size:20px}

/* SKIN INFO */
.sname{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.smeta{font-size:10px;color:var(--text3);margin-top:1px;font-family:'Share Tech Mono',monospace}
.sprice{text-align:right;flex-shrink:0}
.sprice-low{font-size:16px;font-weight:700;color:var(--orange);font-family:'Share Tech Mono',monospace}
.sprice-med{font-size:10px;color:var(--text3);font-family:'Share Tech Mono',monospace}

/* DETAIL */
.detail{padding:0 12px 12px;border-top:1px solid var(--border)}
.drow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.drow:last-child{border-bottom:none}
.dlabel{color:var(--text2)}
.dval{font-weight:600;font-family:'Share Tech Mono',monospace}
.dacts{display:flex;gap:6px;margin-top:10px}

/* BUTTONS */
.btn{height:34px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:opacity .15s;
  clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,7px 100%,0 calc(100% - 7px))}
.btn:active{opacity:.7}
.btn-primary{background:var(--orange);color:#000}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red)}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff}
.btn-full{width:100%}

/* SECTION HEADER */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);
  display:flex;align-items:center;gap:6px}
.sec-title::before{content:'';width:3px;height:12px;background:var(--orange);display:block}
.sec-badge{font-size:10px;color:var(--text3);font-family:'Share Tech Mono',monospace}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:10px}
.search-input{width:100%;height:42px;background:var(--card);border:1px solid var(--border);
  color:var(--text);font-size:14px;padding:0 42px 0 14px;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
  transition:border-color .2s}
.search-input:focus{border-color:var(--orange)}
.search-input::placeholder{color:var(--text3)}
.search-btn{position:absolute;right:0;top:0;bottom:0;width:42px;background:var(--orange);color:#000;
  clip-path:polygon(10px 0,100% 0,100% 100%,0 100%);display:flex;align-items:center;justify-content:center}

/* PORTFOLIO SUMMARY */
.port-sum{background:var(--card);border:1px solid var(--border);padding:12px 14px;margin-bottom:10px;
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));position:relative}
.port-sum::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),transparent)}
.sum-label{font-size:10px;letter-spacing:1px;color:var(--text3);text-transform:uppercase}
.sum-val{font-size:18px;font-weight:700;margin-top:1px;font-family:'Share Tech Mono',monospace}
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--orange)}

/* PORTFOLIO ITEM */
.port-item{background:var(--card);border:1px solid var(--border);margin-bottom:7px;
  display:flex;align-items:center;gap:10px;padding:9px 12px;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px))}
.port-info{flex:1;min-width:0}
.port-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.port-bought{font-size:10px;color:var(--text3);margin-top:1px;font-family:'Share Tech Mono',monospace}
.port-right{text-align:right;flex-shrink:0}
.port-cur{font-size:14px;font-weight:700;font-family:'Share Tech Mono',monospace}
.port-pnl{font-size:10px;font-weight:700;margin-top:1px;font-family:'Share Tech Mono',monospace}

/* WATCHLIST */
.watch-item{background:var(--card);border:1px solid var(--border);margin-bottom:7px;padding:9px 12px;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px))}
.watch-hdr{display:flex;justify-content:space-between;align-items:flex-start}
.watch-name{font-size:13px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:6px}
.watch-del{background:none;color:var(--text3);font-size:15px;padding:0 3px;transition:color .15s;flex-shrink:0}
.watch-del:hover{color:var(--red)}
.watch-body{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.watch-cond{font-size:10px;color:var(--text3);font-family:'Share Tech Mono',monospace}
.watch-cond span{color:var(--orange);font-weight:700}
.watch-status{display:flex;align-items:center;gap:4px;font-size:10px;font-family:'Share Tech Mono',monospace}
.dot{width:5px;height:5px;border-radius:50%;animation:pulse 2s infinite}
.dot-g{background:var(--green)}.dot-o{background:var(--orange)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* TOP */
.top-tabs{display:flex;gap:6px;margin-bottom:10px}
.top-tab{flex:1;height:32px;background:var(--card);color:var(--text3);border:1px solid var(--border);
  font-size:10px;letter-spacing:1px;text-transform:uppercase;font-family:'Share Tech Mono',monospace;
  clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));transition:all .2s}
.top-tab.active{background:var(--orange);color:#000;border-color:var(--orange)}
.top-item{background:var(--card);border:1px solid var(--border);margin-bottom:7px;
  display:flex;align-items:center;gap:10px;padding:9px 12px;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px))}
.top-rank{font-size:17px;font-weight:700;color:var(--text3);font-family:'Share Tech Mono',monospace;width:24px;text-align:center;flex-shrink:0}
.rank-g{color:#ffd700}.rank-s{color:#c0c0c0}.rank-b{color:#cd7f32}
.top-info{flex:1;min-width:0}
.top-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-vol{font-size:10px;color:var(--text3);margin-top:1px;font-family:'Share Tech Mono',monospace}
.top-price{font-size:15px;font-weight:700;color:var(--orange);font-family:'Share Tech Mono',monospace;text-align:right;flex-shrink:0}
.top-change{font-size:11px;font-weight:700;font-family:'Share Tech Mono',monospace}

/* HOME SECTIONS */
.home-block{margin-bottom:16px}
.home-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.home-scroll::-webkit-scrollbar{display:none}
.home-card-h{flex-shrink:0;width:140px;background:var(--card);border:1px solid var(--border);padding:10px;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));cursor:pointer}
.home-card-h::before{content:'';display:block;height:2px;margin:-10px -10px 8px;background:linear-gradient(90deg,var(--orange),transparent)}
.hcard-img{width:100%;height:64px;background:var(--card2);display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.hcard-img img{width:100%;height:100%;object-fit:contain}
.hcard-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hcard-price{font-size:13px;font-weight:700;color:var(--orange);font-family:'Share Tech Mono',monospace;margin-top:2px}
.hcard-change{font-size:10px;font-weight:700;font-family:'Share Tech Mono',monospace;margin-top:1px}

/* PREMIUM BANNER */
.prem-banner{background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(168,85,247,.1));
  border:1px solid rgba(168,85,247,.4);padding:10px 12px;margin-bottom:10px;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px))}
.prem-banner-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.prem-banner-title{font-size:12px;font-weight:700;letter-spacing:1px;color:var(--purple)}
.prem-banner-badge{font-size:9px;background:var(--purple);color:#fff;padding:2px 6px}
.prem-banner-text{font-size:11px;color:var(--text2);line-height:1.4;margin-bottom:8px}
.prem-banner-btn{width:100%;height:32px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;
  font-size:11px;font-weight:700;letter-spacing:1px;
  clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,7px 100%,0 calc(100% - 7px))}

/* LIMIT BAR */
.limit-bar{background:var(--card);border:1px solid var(--border);padding:8px 12px;
  margin-bottom:10px;display:flex;align-items:center;gap:10px;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px))}
.limit-txt{font-size:10px;color:var(--text3);font-family:'Share Tech Mono',monospace;flex:1}
.limit-txt span{color:var(--orange);font-weight:700}
.limit-progress{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.limit-fill{height:100%;background:var(--orange);transition:width .3s}
.limit-fill.warn{background:var(--red)}

/* VIEWS LOCKED */
.locked{text-align:center;padding:32px 16px;color:var(--text3)}
.locked-icon{font-size:36px;margin-bottom:10px;opacity:.6}
.locked-text{font-size:13px;line-height:1.6;margin-bottom:14px}

/* PREMIUM PAGE */
.prem-hero{text-align:center;padding:16px 0 20px}
.prem-icon{font-size:40px;margin-bottom:8px}
.prem-title{font-size:22px;font-weight:700;color:var(--purple);letter-spacing:2px}
.prem-sub{font-size:12px;color:var(--text2);margin-top:4px}
.prem-features{background:var(--card);border:1px solid rgba(168,85,247,.3);padding:12px 14px;
  margin-bottom:12px;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px))}
.prem-feat{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.prem-feat:last-child{border-bottom:none}
.feat-icon{font-size:14px;width:20px;text-align:center}
.prem-price-block{background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(168,85,247,.1));
  border:1px solid rgba(168,85,247,.5);padding:14px;margin-bottom:10px;text-align:center;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px))}
.prem-price{font-size:28px;font-weight:700;color:var(--purple);font-family:'Share Tech Mono',monospace}
.prem-period{font-size:11px;color:var(--text3)}
.prem-buy-btn{width:100%;height:44px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;
  font-size:14px;font-weight:700;letter-spacing:2px;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
  margin-bottom:10px}

/* REFERRAL */
.ref-block{background:var(--card);border:1px solid var(--border);padding:12px 14px;
  margin-bottom:10px;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px))}
.ref-link{background:var(--card2);border:1px solid var(--border);padding:8px 10px;margin:8px 0;
  font-size:11px;color:var(--cyan);font-family:'Share Tech Mono',monospace;word-break:break-all}
.ref-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}
.ref-stat{text-align:center;background:var(--card2);padding:8px 4px;
  clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px))}
.ref-stat-val{font-size:18px;font-weight:700;color:var(--orange);font-family:'Share Tech Mono',monospace}
.ref-stat-lbl{font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:2px}

/* EMPTY / LOADING */
.empty{text-align:center;padding:40px 16px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.5}
.empty-text{font-size:13px;line-height:1.6}
.loading{text-align:center;padding:28px 16px;color:var(--text3);font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:2px}
.loading::after{content:'';animation:ldots 1.2s infinite}
@keyframes ldots{0%{content:'.'}33%{content:'..'}66%{content:'...'}100%{content:''}}

/* TOAST */
.toast{position:fixed;bottom:66px;left:50%;transform:translateX(-50%);
  background:var(--card2);border:1px solid var(--border);color:var(--text);
  padding:9px 18px;font-size:12px;font-weight:600;white-space:nowrap;z-index:999;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
  opacity:0;pointer-events:none;transition:opacity .2s}
.toast.show{opacity:1}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(10,10,15,.85);
  display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{width:100%;background:var(--bg2);border-top:2px solid var(--orange);
  border-left:1px solid var(--border);border-right:1px solid var(--border);
  padding:18px 14px 28px;transform:translateY(100%);transition:transform .25s;position:relative}
.overlay.open .modal{transform:translateY(0)}
.modal-title{font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--orange);margin-bottom:14px}
.modal-input{width:100%;height:42px;background:var(--card);border:1px solid var(--border);
  color:var(--text);font-size:14px;padding:0 12px;margin-bottom:10px;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px))}
.modal-input:focus{border-color:var(--orange)}
.modal-input::placeholder{color:var(--text3)}
.modal-close{position:absolute;right:14px;top:14px;background:none;color:var(--text3);font-size:18px}

/* ADD BTN */
.add-btn{width:100%;height:40px;background:transparent;color:var(--orange);
  border:1px dashed var(--orange);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
  opacity:.7;transition:opacity .15s;margin-top:4px}
.add-btn:active{opacity:1}

/* SUGGESTIONS */
.suggestions{margin-bottom:10px}
.suggest-item{display:inline-block;background:var(--card);border:1px solid var(--border);
  color:var(--text2);font-size:13px;font-weight:600;padding:6px 12px;margin:0 6px 6px 0;cursor:pointer;
  clip-path:polygon(0 0,calc(100% - 5px) 0,100% 5px,100% 100%,5px 100%,0 calc(100% - 5px));
  transition:all .15s}
.suggest-item:active{background:var(--orange);color:#000;border-color:var(--orange)}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-hex">⬡</div>
      <div>
        <div class="hdr-title">CS2 TRACKER</div>
        <div class="hdr-sub" id="hdrSub">SKIN PRICE MONITOR</div>
      </div>
    </div>
    <div class="hdr-right">
      <div id="hdrPremium" style="display:none" class="hdr-premium">PRO</div>
      <div class="hdr-avatar" id="userAvatar">?</div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="content">

    <!-- HOME -->
    <div class="section active" id="sec-home">
      <div id="homeContent"></div>
    </div>

    <!-- SEARCH -->
    <div class="section" id="sec-search">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="text"
          placeholder="AK-47, AWP Asiimov, Karambit..." autocomplete="off">
        <button class="search-btn" id="searchBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </div>
      <div id="searchSuggestions" class="suggestions"></div>
      <div id="searchResults"></div>
    </div>

    <!-- PORTFOLIO -->
    <div class="section" id="sec-portfolio">
      <div class="sec-hdr">

<div class="overlay" id="portModal">

      <button class="btn btn-primary" style="flex:1" id="portModalConfirm">ДОБАВИТЬ</button>
      <button class="btn btn-secondary" style="flex:1" id="portModalCancel">ОТМЕНА</button>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const API   = 'https://costs-sophisticated-bibliographic-qui.trycloudflare.com';
const SYM   = 'руб.';
const CUR   = 'RUB';
const APP_URL = 'https://mistern0ob.github.io/cs2-bot/';

// Free tier limits
const FREE_VIEWS_PER_WEEK = 5;
const WEEK_KEY  = 'views_week';
const COUNT_KEY = 'views_count';

// ── TELEGRAM ──────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
let userId = 0, userName = '', isPremium = false;

if (tg) {
  tg.ready(); tg.expand();
  const u = tg.initDataUnsafe?.user;
  if (u) {
    userId = u.id; userName = u.first_name || '';
    const av = document.getElementById('userAvatar');
    if (u.photo_url) av.innerHTML = `<img src="${u.photo_url}">`;
    else av.textContent = (u.first_name||'?')[0].toUpperCase();
  }
}

// ── VIEWS LIMITER ─────────────────────────────────────────────
function getViewsUsed() {
  const week = getWeekKey();
  const stored = localStorage.getItem(WEEK_KEY);
  if (stored !== week) { localStorage.setItem(WEEK_KEY, week); localStorage.setItem(COUNT_KEY, '0'); }
  return parseInt(localStorage.getItem(COUNT_KEY) || '0');
}
function incrementViews() {
  localStorage.setItem(COUNT_KEY, String(getViewsUsed() + 1));
}
function getWeekKey() {
  const d = new Date(); const jan1 = new Date(d.getFullYear(),0,1);
  return `${d.getFullYear()}_${Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7)}`;
}
function viewsLeft() { return Math.max(0, FREE_VIEWS_PER_WEEK - getViewsUsed()); }
function canView() { return isPremium || viewsLeft() > 0; }

function renderLimitBar(container) {
  if (isPremium) return;
  const used = getViewsUsed(), left = viewsLeft();
  const pct = Math.min(100, (used / FREE_VIEWS_PER_WEEK) * 100);
  const div = document.createElement('div');
  div.className = 'limit-bar';
  div.innerHTML = `
    <div class="limit-txt">Просмотров: <span>${left}</span> из ${FREE_VIEWS_PER_WEEK} в неделю</div>
    <div class="limit-progress"><div class="limit-fill ${pct>70?'warn':''}" style="width:${pct}%"></div></div>`;
  container.prepend(div);
}

function lockedHTML(reason) {
  return `<div class="locked">
    <div class="locked-icon">🔒</div>
    <div class="locked-text">${reason}<br><span style="color:var(--text3);font-size:11px">Лимит обновляется каждую неделю</span></div>
    <button class="btn btn-purple btn-full" style="margin-top:10px" onclick="switchSection('premium')">⭐ Получить Премиум</button>
  </div>`;
}

function premiumBanner() {
  if (isPremium) return '';
  return `<div class="prem-banner">
    <div class="prem-banner-hdr">
      <div class="prem-banner-title">⭐ PREMIUM</div>
      <div class="prem-banner-badge">БЕЗЛИМИТ</div>
    </div>
    <div class="prem-banner-text">Безлимитные просмотры цен, аналитика роста и история за 30 дней</div>
    <button class="prem-banner-btn" onclick="switchSection('premium')">КУПИТЬ ПРЕМИУМ →</button>
  </div>`;
}

// ── USER STATUS ────────────────────────────────────────────────
async function loadUserStatus() {
  if (!userId) return;
  const data = await api('/api/user/status');
  if (data?.premium) {
    isPremium = true;
    document.getElementById('hdrPremium').style.display = 'block';
  }
}

// ── API ───────────────────────────────────────────────────────
async function api(path, params={}) {
  const q = new URLSearchParams({...params, user_id: userId||0, currency: CUR});
  try {
    const r = await fetch(`${API}${path}?${q}`, {signal: AbortSignal.timeout(9000)});
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch(e) { console.warn('API:', path, e); return null; }
}

// ── NAV ───────────────────────────────────────────────────────
const loaded = {};
let active = 'home';

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => switchSection(btn.dataset.sec));
});

function switchSection(sec) {
  document.querySelector('.section.active')?.classList.remove('active');
  document.querySelector('.nav-btn.active')?.classList.remove('active');
  document.getElementById(`sec-${sec}`).classList.add('active');
  document.querySelector(`.nav-btn[data-sec="${sec}"]`)?.classList.add('active');
  active = sec;
  if (!loaded[sec]) { loaded[sec] = true; loadSection(sec); }
}

function loadSection(sec) {
  if (sec === 'home')      loadHome();
  if (sec === 'portfolio') loadPortfolio();
  if (sec === 'watch')     loadWatch();
  if (sec === 'premium')   renderPremium();
}

// ── HOME ──────────────────────────────────────────────────────
async function loadHome() {
  const el = document.getElementById('homeContent');
  el.innerHTML = `<div class="loading">ЗАГРУЗКА</div>`;
  const data = await api('/api/home');
  if (!data) { el.innerHTML = `<div class="empty"><div class="empty-icon">📡</div><div class="empty-text">Нет соединения с сервером</div></div>`; return; }
  let html = '';
  if (data.trending?.length) {
    html += `<div class="home-block">
      <div class="sec-hdr"><div class="sec-title">📈 Рост за 24ч</div></div>
      <div class="home-scroll">${data.trending.map(homeCardHTML).join('')}</div>
    </div>`;
  }
  if (data.expensive?.length) {
    html += `<div class="home-block">
      <div class="sec-hdr"><div class="sec-title">💎 Самые дорогие</div></div>
      <div class="home-scroll">${data.expensive.map(homeCardHTML).join('')}</div>
    </div>`;
  }
  if (data.popular?.length) {
    html += `<div class="home-block">
      <div class="sec-hdr"><div class="sec-title">🔥 Популярные</div></div>
      <div class="home-scroll">${data.popular.map(homeCardHTML).join('')}</div>
    </div>`;
  }
  html += premiumBanner();
  el.innerHTML = html;
  el.querySelectorAll('.home-card-h').forEach(c => {
    c.addEventListener('click', () => {
      searchInput.value = c.dataset.name;
      switchSection('search');
      doSearch(c.dataset.name);
    });
  });
}

function homeCardHTML(item) {
  const changeClass = (item.change||0) >= 0 ? 'pos' : 'neg';
  const changeText  = item.change != null ? `${item.change>=0?'+':''}${item.change}%` : '';
  return `<div class="home-card-h" data-name="${esc(item.name)}">
    <div class="hcard-img">${item.image?`<img src="${item.image}" loading="lazy">`:'🔫'}</div>
    <div class="hcard-name">${esc(shortName(item.name))}</div>
    <div class="hcard-price">${fmt(item.lowest_price)} ${SYM}</div>
    ${changeText?`<div class="hcard-change ${changeClass}">${changeText}</div>`:''}
  </div>`;
}

function shortName(name) {
  // "AK-47 | Redline (Field-Tested)" → "AK-47 | Redline"
  return name.replace(/\s*\([^)]+\)$/, '');
}

// ── SEARCH ────────────────────────────────────────────────────
const searchInput = document.getElementById('searchInput');
const searchBtn   = document.getElementById('searchBtn');
const searchRes   = document.getElementById('searchResults');
let searchTimer = null, expandedCard = null, pendingSkin = null;

const QUICK_SUGGESTIONS = ['AK-47','AWP','M4A4','Karambit','Butterfly Knife','Glock-18','USP-S','Desert Eagle','M4A1-S','P250'];

document.getElementById('searchSuggestions').innerHTML = QUICK_SUGGESTIONS.map(s =>
  `<span class="suggest-item" onclick="quickSearch('${s}')">${s}</span>`).join('');

function quickSearch(name) {
  searchInput.value = name;
  doSearch(name);
}

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = searchInput.value.trim();
  if (q.length < 2) { searchRes.innerHTML = ''; return; }
  searchTimer = setTimeout(() => doSearch(q), 500);
});
searchBtn.addEventListener('click', () => { const q=searchInput.value.trim(); if(q.length>=2) doSearch(q); });
searchInput.addEventListener('keydown', e => { if(e.key==='Enter'){const q=searchInput.value.trim();if(q.length>=2)doSearch(q);} });

async function doSearch(q) {
  if (!canView()) {
    searchRes.innerHTML = lockedHTML('Исчерпан лимит просмотров на эту неделю.');
    return;
  }
  searchRes.innerHTML = `<div class="loading">ПОИСК</div>`;
  const data = await api('/api/search', {q});
  // API недоступен
  if (data === null) {
    searchRes.innerHTML = `<div class="empty"><div class="empty-icon">📡</div>
      <div class="empty-text">Нет соединения с сервером<br>
      <span style="font-size:11px;color:var(--text3)">Попробуй позже</span></div></div>`;
    return;
  }
  // Ничего не найдено
  if (!data.items?.length) {
    searchRes.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>
      <div class="empty-text">Ничего не найдено<br>
      <span style="font-size:11px;color:var(--text3)">Попробуй: AK-47 Redline или AWP Asiimov</span></div></div>`;
    return;
  }
  // Считаем просмотр только при успешном результате
  incrementViews();
  searchRes.innerHTML = data.items.map(skinCardHTML).join('') + premiumBanner();
  renderLimitBar(searchRes);
  searchRes.querySelectorAll('.card').forEach(c => c.addEventListener('click', () => toggleDetail(c)));
}

function skinCardHTML(item) {
  const p = item.lowest_price ? `<div class="sprice-low">${fmt(item.lowest_price)} ${SYM}</div><div class="sprice-med">ср. ${fmt(item.median_price)} ${SYM}</div>` : `<div class="sprice-low" style="color:var(--text3)">—</div>`;
  return `<div class="card" data-name="${esc(item.name)}" data-low="${item.lowest_price||0}" data-med="${item.median_price||0}">
    <div class="card-inner">
      <div class="simg">${item.image?`<img src="${item.image}" loading="lazy">`:`<div class="simg-ph">🔫</div>`}</div>
      <div style="flex:1;min-width:0"><div class="sname">${esc(item.name)}</div><div class="smeta">VOL: ${item.volume||'—'}</div></div>
      <div class="sprice">${p}</div>
    </div>
  </div>`;
}

async function toggleDetail(card) {
  if (expandedCard && expandedCard !== card) { expandedCard.querySelector('.detail')?.remove(); expandedCard=null; }
  if (card.querySelector('.detail')) { card.querySelector('.detail').remove(); expandedCard=null; return; }
  expandedCard = card;
  const name = card.dataset.name, low = parseFloat(card.dataset.low)||0, med = parseFloat(card.dataset.med)||0;
  const div = document.createElement('div');
  div.className = 'detail';
  div.innerHTML = `
    <div class="drow"><span class="dlabel">Минимальная</span><span class="dval">${fmt(low)} ${SYM}</span></div>
    <div class="drow"><span class="dlabel">Средняя</span><span class="dval">${fmt(med)} ${SYM}</span></div>
    <div class="dacts">
      <button class="btn btn-primary" style="flex:1" onclick="openPortModal('${esc(name)}',${low})">+ Портфель</button>
      <button class="btn btn-secondary" style="flex:1" onclick="addWatch('${esc(name)}',${low})">👁 Следить</button>
    </div>`;
  card.appendChild(div);
  card.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── PORTFOLIO ─────────────────────────────────────────────────
async function loadPortfolio() {
  const el = document.getElementById('portContent');
  el.innerHTML = `<div class="loading">ЗАГРУЗКА</div>`;
  const data = await api('/api/portfolio');
  document.getElementById('portDate').textContent = new Date().toLocaleDateString('ru-RU');
  if (!data?.items?.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">Портфель пуст</div></div>
      <button class="add-btn" onclick="switchSection('search')">+ ДОБАВИТЬ СКИН</button>
      ${premiumBanner()}`;
    return;
  }
  let tBuy=0, tCur=0;
  data.items.forEach(i=>{ tBuy+=i.buy_price; tCur+=(i.current_price||i.buy_price); });
  const pnl=tCur-tBuy, pct=tBuy>0?((pnl/tBuy)*100).toFixed(1):'0.0';
  const sum = `<div class="port-sum">
    <div><div class="sum-label">Вложено</div><div class="sum-val neu">${fmt(tBuy)}</div></div>
    <div><div class="sum-label">Сейчас</div><div class="sum-val neu">${fmt(tCur)}</div></div>
    <div><div class="sum-label">Прибыль</div><div class="sum-val ${pnl>=0?'pos':'neg'}">${pnl>=0?'+':''}${fmt(pnl)}</div></div>
    <div><div class="sum-label">Изменение</div><div class="sum-val ${pnl>=0?'pos':'neg'}">${pnl>=0?'+':''}${pct}%</div></div>
  </div>`;
  const items = data.items.map(it=>{
    const cur=it.current_price||it.buy_price, p=cur-it.buy_price;
    const pp=it.buy_price>0?((p/it.buy_price)*100).toFixed(1):'0.0';
    return `<div class="port-item">
      <div class="port-info"><div class="port-name">${esc(it.name)}</div><div class="port-bought">куплено: ${fmt(it.buy_price)} ${SYM}</div></div>
      <div class="port-right"><div class="port-cur">${fmt(cur)} ${SYM}</div>
        <div class="port-pnl ${p>=0?'pos':'neg'}">${p>=0?'+':''}${fmt(p)} (${p>=0?'+':''}${pp}%)</div></div>
    </div>`;
  }).join('');
  el.innerHTML = sum + items + `<button class="add-btn" onclick="switchSection('search')">+ ДОБАВИТЬ СКИН</button>` + premiumBanner();
}

// portfolio modal
let pendingSkinName=null;
function openPortModal(name, price) {
  pendingSkinName=name;
  document.getElementById('portModalName').textContent=name;
  document.getElementById('portModalPrice').value=price?Math.round(price):'';
  document.getElementById('portModal').classList.add('open');
}
function closePortModal() { document.getElementById('portModal').classList.remove('open'); pendingSkinName=null; }
document.getElementById('portModalClose').onclick=closePortModal;
document.getElementById('portModalCancel').onclick=closePortModal;
document.getElementById('portModal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closePortModal(); });
document.getElementById('portModalConfirm').onclick = async()=>{
  if(!userId){showToast('Открой через Telegram','err');closePortModal();return;}
  const p=parseFloat(document.getElementById('portModalPrice').value);
  if(!pendingSkinName||!p||p<=0){showToast('Введи корректную цену','err');return;}
  // Сохраняем имя ДО закрытия модала (closePortModal сбрасывает pendingSkinName)
  const skinName = pendingSkinName;
  closePortModal();
  const r=await api('/api/portfolio/add',{name:skinName,buy_price:p});
  if(r?.ok){showToast('Добавлено в портфель ✓','ok');loaded.portfolio=false;}
  else showToast('Ошибка добавления','err');
};

// ── WATCHLIST ─────────────────────────────────────────────────
async function loadWatch() {
  const el = document.getElementById('watchContent');
  el.innerHTML = `<div class="loading">ЗАГРУЗКА</div>`;
  const data = await api('/api/watchlist');
  document.getElementById('watchCount').textContent = `${data?.items?.length||0} скинов`;
  if (!data?.items?.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">👁</div><div class="empty-text">Вотчлист пуст<br><span style="font-size:11px;color:var(--text3)">Найди скин и нажми «Следить»</span></div></div>${premiumBanner()}`;
    return;
  }
  el.innerHTML = data.items.map(it=>`
    <div class="watch-item">
      <div class="watch-hdr">
        <div class="watch-name">${esc(it.name)}</div>
        <button class="watch-del" onclick="removeWatchItem(${it.id},this)">✕</button>
      </div>
      <div class="watch-body">
        <div class="watch-cond">если ${it.condition==='below'?'ниже':'выше'} <span>${fmt(it.threshold)} ${SYM}</span></div>
        <div class="watch-status"><div class="dot dot-g"></div><span style="color:var(--text3)">слежу</span></div>
      </div>
    </div>`).join('') + premiumBanner();
}

async function addWatch(name, price) {
  if(!userId){showToast('Открой через Telegram','err');return;}
  const threshold = price ? Math.round(price*0.9) : 0;
  const r = await api('/api/watchlist/add',{name,condition:'below',threshold});
  if(r?.ok){showToast('Добавлено в вотчлист ✓','ok');loaded.watch=false;}
  else showToast('Ошибка. Попробуй в боте.','err');
}
async function removeWatchItem(id, btn) {
  btn.closest('.watch-item').style.opacity='.4';
  const r=await api('/api/watchlist/remove',{id});
  if(r?.ok){loaded.watch=false;loadWatch();showToast('Удалено','ok');}
  else{btn.closest('.watch-item').style.opacity='1';showToast('Ошибка','err');}
}

// ── PREMIUM PAGE ──────────────────────────────────────────────
async function renderPremium() {
  const el = document.getElementById('premContent');
  const ref = await api('/api/user/status');
  const refLink = `t.me/cs2skinprice_bot?start=ref_${userId}`;
  const invited = ref?.referrals||0, bonus = ref?.bonus_views||0;
  el.innerHTML = `
    <div class="prem-hero">
      <div class="prem-icon">⭐</div>
      <div class="prem-title">${isPremium?'PREMIUM АКТИВЕН':'PREMIUM'}</div>
      <div class="prem-sub">${isPremium?'Безлимитный доступ включён':'Убери все ограничения'}</div>
    </div>
    ${!isPremium?`
    <div class="prem-features">
      <div class="prem-feat"><div class="feat-icon">✅</div>Безлимитные просмотры цен</div>
      <div class="prem-feat"><div class="feat-icon">✅</div>Аналитика и история цен за 30 дней</div>
      <div class="prem-feat"><div class="feat-icon">✅</div>Топ роста за 24 часа</div>
      <div class="prem-feat"><div class="feat-icon">✅</div>Приоритетные уведомления</div>
      <div class="prem-feat"><div class="feat-icon">✅</div>Портфель без ограничений</div>
    </div>
    <div class="prem-price-block">
      <div class="prem-price">⭐ 200 Stars</div>
      <div class="prem-period">в месяц · оплата через Telegram</div>
    </div>
    <button class="prem-buy-btn" onclick="buyPremium()">⭐ КУПИТЬ ПРЕМИУМ</button>`:''}

    <div class="home-block">
      <div class="sec-hdr"><div class="sec-title">👥 Реферальная программа</div></div>
      <div class="ref-block">
        <div style="font-size:12px;color:var(--text2);margin-bottom:4px">За каждого приглашённого — <span style="color:var(--orange);font-weight:700">+5 просмотров</span> в неделю</div>
        <div class="ref-link">${userId ? refLink : 'Открой через Telegram'}</div>
        <button class="btn btn-secondary btn-full" style="margin-bottom:8px" onclick="copyRef('${refLink}')">📋 СКОПИРОВАТЬ ССЫЛКУ</button>
        <div class="ref-stats">
          <div class="ref-stat"><div class="ref-stat-val">${invited}</div><div class="ref-stat-lbl">Приглашено</div></div>
          <div class="ref-stat"><div class="ref-stat-val">${bonus}</div><div class="ref-stat-lbl">Бонус</div></div>
          <div class="ref-stat"><div class="ref-stat-val">${viewsLeft()+bonus}</div><div class="ref-stat-lbl">Осталось</div></div>
        </div>
      </div>
    </div>`;
}

function buyPremium() {
  if (tg) {
    // Отправляем данные боту и закрываем Mini App — бот выставит инвойс
    tg.sendData('buy_premium');
  } else {
    showToast('Открой через Telegram','err');
  }
}
function copyRef(link) {
  if (navigator.clipboard) navigator.clipboard.writeText(link).then(()=>showToast('Ссылка скопирована ✓','ok'));
  else showToast('Скопируй вручную','err');
}

// ── UTILS ─────────────────────────────────────────────────────
function fmt(n) {
  if(!n&&n!==0) return '—';
  return parseFloat(n).toLocaleString('ru-RU',{minimumFractionDigits:0,maximumFractionDigits:2});
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let toastT=null;
function showToast(msg,type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast show ${type}`;
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2500);
}

// ── INIT ──────────────────────────────────────────────────────
(async()=>{
  await loadUserStatus();
  loadSection('home');
})();
</script>
